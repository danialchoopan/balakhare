version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:80"
    environment:
      - DatabaseProvider=PostgreSQL
      - ConnectionStrings__DefaultConnection=Host=db;Database=balakhare;Username=postgres;Password=balakhare_pass
    depends_on:
      - db
    volumes:
      - app_data:/app/wwwroot/uploads

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=balakhare
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=balakhare_pass
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  app_data:
  db_data:
